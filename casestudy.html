<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0C0A12;
  --bg-elevated:#13111B;
  --glass:rgba(255,255,255,0.03);
  --accent:#A78BFA;
  --accent-light:#C4B5FD;
  --accent-dim:rgba(167,139,250,0.10);
  --accent-glow:rgba(167,139,250,0.18);
  --text:#F4F2F7;
  --text-2:#A09BB0;
  --text-3:#6E6880;
  --border:rgba(255,255,255,0.06);
  --border-hover:rgba(255,255,255,0.13);
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(0.16,1,0.3,1);
}

html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--accent-dim) transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* ── Progress ── */
#progress{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-light));z-index:2000;transition:width .1s linear}

/* ── Ambient ── */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0}
.ambient::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:120%;height:60%;background:radial-gradient(ellipse,rgba(167,139,250,0.035),transparent 70%)}

/* ── Nav ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 48px;height:68px;display:flex;align-items:center;justify-content:space-between;background:rgba(12,10,18,0.7);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:all .4s var(--ease)}
.nav.scrolled{background:rgba(12,10,18,0.92)}
.nav-logo{font-size:19px;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:8px}
.nav-logo .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.nav-back{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--text-2);transition:color .2s}
.nav-back:hover{color:var(--text)}
.nav-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s var(--ease)}
.nav-back:hover svg{transform:translateX(-3px)}
.nav-cta{padding:7px 18px;border:1px solid var(--border-hover);border-radius:100px;font-size:13px;font-weight:500;color:var(--text);transition:all .3s var(--ease);background:transparent}
.nav-cta:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* ── Reveal ── */
.r{opacity:0;transform:translateY(20px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.r.on{opacity:1;transform:translateY(0)}
.r1{transition-delay:.07s}.r2{transition-delay:.14s}.r3{transition-delay:.21s}.r4{transition-delay:.28s}

/* ════════════════════════════
   ARTICLE HEADER  (centered)
════════════════════════════ */
.article-header{
  padding: 112px 24px 0;
  max-width: 640px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}

/* category pill */
.art-label{
  display:inline-block;
  font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent);font-family:var(--mono);
  margin-bottom:24px;
}

/* title */
.article-header h1{
  font-size:clamp(30px,5vw,52px);
  font-weight:800;
  letter-spacing:-2px;
  line-height:1.05;
  margin-bottom:20px;
}

/* subtitle */
.article-header .sub{
  font-size:16px;color:var(--text-2);line-height:1.75;
  max-width:520px;margin:0 auto 36px;
}

/* meta row */
.meta-row{
  display:flex;justify-content:center;gap:48px;
  padding:28px 0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin-bottom:48px;
}
.meta-col{text-align:center}
.meta-col .mk{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-3);font-family:var(--mono);margin-bottom:6px}
.meta-col .mv{font-size:13px;font-weight:500;color:var(--text)}

/* ════════════════════════════
   HERO IMAGE
════════════════════════════ */
.hero-image{
  max-width: 960px;
  margin: 0 auto 0;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}
.hero-img-frame{
  width:100%;
  aspect-ratio:16/9;
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--bg-elevated);
  position:relative;
}
/* Real screenshot support */
.hero-img-frame.has-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
/* Site link chip */
.case-site-link{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 16px;
  background:var(--accent-dim);
  border:1px solid rgba(167,139,250,0.2);
  border-radius:100px;
  font-size:13px;font-weight:500;color:var(--accent);
  transition:all .3s var(--ease);
  margin-top:24px;
}
.case-site-link:hover{background:var(--accent);color:var(--bg)}
.case-site-link svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* decorative screen inside frame */
.him-inner{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(167,139,250,0.05) 0%,rgba(12,10,18,0) 60%);
  display:grid;
  grid-template-columns:200px 1fr;
}
.him-sidebar{
  background:rgba(255,255,255,0.015);
  border-right:1px solid var(--border);
  padding:28px 16px;
  display:flex;flex-direction:column;gap:8px;
}
.him-nav{height:24px;border-radius:6px;background:rgba(255,255,255,0.04)}
.him-nav.a{background:rgba(167,139,250,0.18);width:88%}
.him-nav:nth-child(2){width:72%}
.him-nav:nth-child(3){width:82%}
.him-nav:nth-child(4){width:60%;margin-top:10px}
.him-main{padding:28px;display:flex;flex-direction:column;gap:14px}
.him-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.him-kpi{height:60px;border-radius:10px;background:rgba(255,255,255,0.025);border:1px solid var(--border);padding:12px;display:flex;flex-direction:column;justify-content:space-between}
.him-kv{height:13px;width:50%;border-radius:4px;background:rgba(167,139,250,0.25)}
.him-kl{height:7px;width:72%;border-radius:4px;background:rgba(255,255,255,0.05)}
.him-chart{flex:1;min-height:60px;border-radius:12px;background:rgba(167,139,250,0.03);border:1px solid rgba(167,139,250,0.07);position:relative;overflow:hidden}
.him-chart::after{content:'';position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(167,139,250,0.2),transparent);clip-path:polygon(0 72%,9% 50%,18% 60%,27% 32%,37% 44%,46% 18%,56% 30%,65% 10%,74% 22%,83% 8%,92% 16%,100% 11%,100% 100%,0 100%)}
.him-table{border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);height:68px;overflow:hidden}
.him-trow{height:22px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:16px}
.him-trow:last-child{border-bottom:none}
.him-tc{height:7px;border-radius:4px;background:rgba(255,255,255,0.05)}

/* ════════════════════════════
   ARTICLE BODY
════════════════════════════ */
.article-body{
  position:relative;
  z-index:1;
  padding:72px 24px 0;
  max-width:860px;
  margin:0 auto;
}

/* layout: share sidebar left + content center */
.article-layout{
  max-width:680px;
  margin:0 auto;
}


/* content column */
.content-col{}

/* Article text styles */
.art-section{margin-bottom:56px}
.art-section:last-child{margin-bottom:0}
.art-h2{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.3;margin-bottom:14px;color:var(--text)}
.art-p{font-size:16px;color:var(--text-2);line-height:1.85;margin-bottom:16px}
.art-p:last-child{margin-bottom:0}

/* section label above heading */
.art-sublabel{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-family:var(--mono);margin-bottom:10px}

/* challenge — bigger lead paragraph */
.art-challenge{
  font-size:clamp(18px,2.2vw,24px);
  font-weight:600;
  color:var(--text);
  line-height:1.5;
  letter-spacing:-.3px;
  border-left:2px solid var(--accent);
  padding-left:20px;
  margin-bottom:56px;
}

/* inline visuals */
.art-visual{margin:32px 0}

/* split cards */
.vis-split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vis-card{border-radius:12px;border:1px solid var(--border);background:var(--bg-elevated);aspect-ratio:4/3;padding:20px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.vc-head{height:13px;width:42%;border-radius:4px;background:rgba(255,255,255,0.07)}
.vc-body{flex:1;border-radius:8px;background:rgba(167,139,250,0.04);border:1px solid rgba(167,139,250,0.07)}
.vc-row{display:flex;gap:7px}
.vc-line{height:7px;border-radius:4px;background:rgba(255,255,255,0.05)}
.vc-chip{height:20px;width:52px;border-radius:20px;background:rgba(167,139,250,0.12)}

/* desktop mini */
.vis-desktop{border-radius:12px;border:1px solid var(--border);background:var(--bg-elevated);aspect-ratio:16/9;overflow:hidden}
.vd-bar{height:28px;background:rgba(255,255,255,0.025);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px}
.vd-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.07)}
.vd-body{display:grid;grid-template-columns:140px 1fr;height:calc(100% - 28px)}
.vd-side{background:rgba(255,255,255,0.015);border-right:1px solid var(--border);padding:12px 10px;display:flex;flex-direction:column;gap:5px}
.vd-sn{height:18px;border-radius:5px;background:rgba(255,255,255,0.04)}
.vd-sn.a{background:rgba(167,139,250,0.15);width:85%}
.vd-sn:nth-child(2){width:70%}
.vd-sn:nth-child(3){width:80%}
.vd-main{padding:16px;display:flex;flex-direction:column;gap:10px}
.vd-title{height:12px;width:30%;border-radius:4px;background:rgba(255,255,255,0.07)}
.vd-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.vd-kpi{height:44px;border-radius:7px;background:rgba(255,255,255,0.025);border:1px solid var(--border);padding:8px;display:flex;flex-direction:column;justify-content:space-between}
.vd-kv{height:10px;width:50%;border-radius:3px;background:rgba(167,139,250,0.22)}
.vd-kl{height:6px;width:70%;border-radius:3px;background:rgba(255,255,255,0.04)}
.vd-chart{border-radius:8px;background:rgba(167,139,250,0.03);border:1px solid rgba(167,139,250,0.07);flex:1;min-height:40px;position:relative;overflow:hidden}
.vd-chart::after{content:'';position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(167,139,250,0.2),transparent);clip-path:polygon(0 72%,9% 50%,18% 60%,27% 32%,37% 44%,46% 18%,56% 30%,65% 10%,74% 22%,83% 8%,92% 16%,100% 11%,100% 100%,0 100%)}

/* quote block */
.vis-quote{
  padding:28px 32px;
  background:rgba(167,139,250,0.04);
  border:1px solid rgba(167,139,250,0.1);
  border-radius:14px;
}
.vis-quote p{font-size:17px;color:var(--text);line-height:1.65;font-weight:500;font-style:italic}
.vis-quote p::before{content:'"';color:var(--accent)}
.vis-quote p::after{content:'"';color:var(--accent)}

/* divider */
.art-rule{height:1px;background:var(--border);margin:48px 0}

/* ── RESULTS strip (full bleed) ── */
.results-strip{
  padding:64px 24px;
  position:relative;z-index:1;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin-top:72px;
}
.results-strip-inner{
  max-width:720px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:2px;
  background:var(--border);
  border-radius:16px;
  overflow:hidden;
}
.rm{background:var(--bg);padding:32px 24px}
.rm-n{font-size:40px;font-weight:900;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,var(--text),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.rm-l{font-size:12px;color:var(--text-3);line-height:1.4}

/* ── NEXT case ── */
.next-wrap{
  padding:64px 24px 80px;
  max-width:720px;
  margin:0 auto;
  position:relative;z-index:1;
}
.next-label-text{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-3);font-family:var(--mono);margin-bottom:16px}
.next-card{
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:32px 36px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:18px;
  transition:all .4s var(--ease);
}
.next-card:hover{border-color:rgba(167,139,250,0.2);background:rgba(255,255,255,0.05);transform:translateY(-3px)}
.next-card-left .nc-sub{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-3);font-family:var(--mono);margin-bottom:8px}
.next-card-left .nc-title{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:10px}
.next-tags{display:flex;gap:7px;flex-wrap:wrap}
.tag{padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:.4px;border-radius:100px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(167,139,250,0.15)}
.tag.n{background:rgba(255,255,255,0.05);color:var(--text-2);border-color:var(--border)}
.next-arrow{width:40px;height:40px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(167,139,250,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s var(--ease)}
.next-arrow svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s var(--ease)}
.next-card:hover .next-arrow{background:var(--accent)}
.next-card:hover .next-arrow svg{stroke:var(--bg);transform:translateX(2px)}

/* ── Footer ── */
.footer{border-top:1px solid var(--border);padding:28px 48px;display:flex;justify-content:space-between;align-items:center;max-width:1280px;margin:0 auto;position:relative;z-index:1}
.footer-left{font-size:13px;color:var(--text-3)}
.footer-links{display:flex;gap:24px}
.footer-links a{font-size:13px;color:var(--text-3);transition:color .2s}
.footer-links a:hover{color:var(--accent)}

/* ── Responsive ── */
@media(max-width:768px){
  .nav{padding:0 20px;height:64px}
  .nav-logo,.nav-back,.nav-cta{min-height:44px;display:inline-flex;align-items:center}
  .article-header{padding-top:96px}
  .meta-row{gap:24px;flex-wrap:wrap}
  .article-layout{grid-template-columns:1fr;gap:0}
  .share-col{display:none}
  .results-strip-inner{grid-template-columns:1fr 1fr}
  .vis-split{grid-template-columns:1fr}
  .next-wrap{padding:48px 24px 64px}
  .footer{flex-direction:column;gap:12px;text-align:center;padding:24px}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation:none!important;transition:none!important}
  .r{opacity:1;transform:none}
}

/* ── Not found ── */
.not-found{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:48px}
.not-found h2{font-size:32px;font-weight:800;letter-spacing:-1px}
.not-found p{color:var(--text-2)}
.not-found a{margin-top:8px;color:var(--accent);font-weight:600}
</style>
</head>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const cs = id ? getCaseById(id) : CASES[0];
const root = document.getElementById('root');

if (!cs) {
  root.innerHTML = `<div class="not-found"><h2>Case not found</h2><p>This case doesn't exist.</p><a href="index.html">← Back to portfolio</a></div>`;
} else {
  document.title = cs.title + ' — Artem Klymenko';
  document.querySelector('meta[name="description"]').setAttribute('content', cs.subtitle);
  document.querySelector('meta[property="og:title"]').setAttribute('content', cs.title + ' — Artem Klymenko');
  document.querySelector('meta[property="og:description"]').setAttribute('content', cs.subtitle);
  document.querySelector('meta[name="twitter:title"]').setAttribute('content', cs.title + ' — Artem Klymenko');
  document.querySelector('meta[name="twitter:description"]').setAttribute('content', cs.subtitle);
  if (cs.coverImage) {
    document.querySelector('meta[property="og:image"]').setAttribute('content', '/' + cs.coverImage);
    document.querySelector('meta[name="twitter:image"]').setAttribute('content', '/' + cs.coverImage);
  }
  root.innerHTML = buildPage(cs, getNextCase(cs.id));
  initReveal();
}

/* ── Visuals ──────────────────────────── */
function buildVisual(s) {
  if (s.visual === 'desktop') return `
    <div class="art-visual r">
      <div class="vis-desktop">
        <div class="vd-bar"><div class="vd-dot"></div><div class="vd-dot"></div><div class="vd-dot"></div></div>
        <div class="vd-body">
          <div class="vd-side">
            <div class="vd-sn a"></div><div class="vd-sn"></div><div class="vd-sn"></div><div class="vd-sn"></div>
          </div>
          <div class="vd-main">
            <div class="vd-title"></div>
            <div class="vd-kpis">
              <div class="vd-kpi"><div class="vd-kv"></div><div class="vd-kl"></div></div>
              <div class="vd-kpi"><div class="vd-kv" style="background:rgba(52,211,153,0.28)"></div><div class="vd-kl"></div></div>
              <div class="vd-kpi"><div class="vd-kv"></div><div class="vd-kl"></div></div>
              <div class="vd-kpi"><div class="vd-kv" style="width:40%"></div><div class="vd-kl"></div></div>
            </div>
            <div class="vd-chart"></div>
          </div>
        </div>
      </div>
    </div>`;

  if (s.visual === 'split') return `
    <div class="art-visual r">
      <div class="vis-split">
        <div class="vis-card">
          <div class="vc-head"></div>
          <div class="vc-body"></div>
          <div class="vc-row"><div class="vc-chip"></div><div class="vc-chip" style="background:rgba(255,255,255,0.05)"></div></div>
        </div>
        <div class="vis-card">
          <div class="vc-head" style="width:60%"></div>
          <div class="vc-row"><div class="vc-line" style="flex:1"></div><div class="vc-line" style="width:28%"></div></div>
          <div class="vc-body"></div>
          <div class="vc-row"><div class="vc-line" style="width:52%"></div></div>
        </div>
      </div>
    </div>`;

  if (s.visual === 'quote') return `
    <div class="art-visual r">
      <div class="vis-quote"><p>${s.quote || ''}</p></div>
    </div>`;

  return '';
}

/* ── Page builder ─────────────────────── */
function buildPage(cs, next) {
  const tags = cs.tags.map(t => `<span class="tag">${t}</span>`).join('');
  const metrics = cs.metrics.map(m => `
    <div class="rm r">
      <div class="rm-n">${m.num}</div>
      <div class="rm-l">${m.label}</div>
    </div>`).join('');

  const sections = cs.sections.map((s, i) => `
    <div class="art-section">
      <div class="art-sublabel r">${s.label}</div>
      <h2 class="art-h2 r r1">${s.title}</h2>
      <p class="art-p r r1">${s.body}</p>
      ${buildVisual(s)}
    </div>
    ${i < cs.sections.length - 1 ? '<div class="art-rule"></div>' : ''}`).join('');

  return `
    <!-- ── HEADER ── -->
    <div class="article-header">
      <div class="art-label r">${cs.tags[0]}</div>
      <h1 class="r r1">${cs.title}</h1>
      <p class="sub r r2">${cs.subtitle}</p>
      <div class="meta-row r r3">
        <div class="meta-col"><div class="mk">Year</div><div class="mv">${cs.year}</div></div>
        <div class="meta-col"><div class="mk">Role</div><div class="mv">${cs.role}</div></div>
        <div class="meta-col"><div class="mk">Timeline</div><div class="mv">${cs.timeline}</div></div>
      </div>
    </div>

    <!-- ── HERO IMAGE ── -->
    <div class="hero-image r">
      ${cs.coverImage
        ? `<div class="hero-img-frame has-image"><img src="${cs.coverImage}" alt="${cs.title} screenshot"></div>`
        : `<div class="hero-img-frame">
        <div class="him-inner">
          <div class="him-sidebar">
            <div class="him-nav a"></div><div class="him-nav"></div>
            <div class="him-nav"></div><div class="him-nav"></div>
          </div>
          <div class="him-main">
            <div class="him-row">
              <div class="him-kpi"><div class="him-kv"></div><div class="him-kl"></div></div>
              <div class="him-kpi"><div class="him-kv" style="background:rgba(52,211,153,0.28)"></div><div class="him-kl"></div></div>
              <div class="him-kpi"><div class="him-kv"></div><div class="him-kl"></div></div>
              <div class="him-kpi"><div class="him-kv" style="width:40%"></div><div class="him-kl"></div></div>
            </div>
            <div class="him-chart"></div>
            <div class="him-table">
              <div class="him-trow"><div class="him-tc" style="width:22%"></div><div class="him-tc" style="width:35%"></div><div class="him-tc" style="width:14%;margin-left:auto"></div></div>
              <div class="him-trow"><div class="him-tc" style="width:28%"></div><div class="him-tc" style="width:20%"></div><div class="him-tc" style="width:18%;margin-left:auto;background:rgba(167,139,250,0.22)"></div></div>
              <div class="him-trow"><div class="him-tc" style="width:18%"></div><div class="him-tc" style="width:40%"></div><div class="him-tc" style="width:12%;margin-left:auto"></div></div>
            </div>
          </div>
        </div>
      </div>`}
      ${cs.siteUrl ? `<div style="text-align:center"><a href="${cs.siteUrl}" target="_blank" rel="noopener" class="case-site-link">Visit Project <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></div>` : ''}
    </div>

    <!-- ── ARTICLE BODY ── -->
    <div class="article-body">
      <div class="article-layout">

        <!-- content -->
        <div class="content-col">

          <!-- challenge -->
          <div class="art-challenge r">${cs.challenge}</div>

          <!-- overview -->
          <div class="art-section">
            <div class="art-sublabel r">Overview</div>
            <p class="art-p r r1">${cs.overview}</p>
          </div>

          <div class="art-rule"></div>

          ${sections}

          <!-- outcome -->
          <div class="art-rule"></div>
          <div class="art-section">
            <div class="art-sublabel r">Outcome</div>
            <p class="art-p r r1">${cs.outcome}</p>
          </div>

          <!-- learnings -->
          <div class="art-rule"></div>
          <div class="art-section" style="padding-bottom:8px">
            <div class="art-sublabel r">Learnings</div>
            <p class="art-p r r1">${cs.learnings}</p>
          </div>

        </div>
      </div>
    </div>

    <!-- ── RESULTS ── -->
    <div class="results-strip">
      <div class="results-strip-inner">${metrics}</div>
    </div>

    <!-- ── NEXT ── -->
    <div class="next-wrap">
      <div class="next-label-text r">Next case study</div>
      <a href="casestudy.html?id=${next.id}" class="next-card r r1">
        <div class="next-card-left">
          <div class="nc-sub">Up next</div>
          <div class="nc-title">${next.title}</div>
          <div class="next-tags">${next.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <div class="next-arrow">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>
    </div>`;
}

/* ── Scroll reveal ── */
function initReveal() {
  const els = document.querySelectorAll('.r');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('on'); });
  }, { threshold: 0.07, rootMargin: '0px 0px -24px 0px' });
  els.forEach(el => obs.observe(el));
}

/* ── Progress ── */
const bar = document.getElementById('progress');
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  bar.style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';
});

/* ── Nav ── */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 60));

/* ── Cursor glow ── */
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  const gl = Object.assign(document.createElement('div'), {
    style:'position:fixed;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,0.04),transparent 60%);pointer-events:none;z-index:0;transform:translate(-50%,-50%)'
  });
  document.body.appendChild(gl);
  let mx=0,my=0,gx=0,gy=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  (function loop(){gx+=(mx-gx)*.08;gy+=(my-gy)*.08;gl.style.left=gx+'px';gl.style.top=gy+'px';requestAnimationFrame(loop)})();
}
</script>
</body>
